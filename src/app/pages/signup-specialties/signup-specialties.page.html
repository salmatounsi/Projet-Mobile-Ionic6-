<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Profil freelancer</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="solid" class="step-badge">Étape 5/6</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="top-section">
    <div class="progress-section">
      <div class="prog-label">
        <span>Progression</span>
        <strong>Spécialités</strong>
      </div>

      <div class="prog-track">
        <div class="prog-fill"></div>
      </div>
    </div>

    <div class="hero-kicker">FreelanceHub</div>
    <h2 class="hero-title">Choisissez vos spécialités</h2>
    <p class="hero-sub">
      Sélectionnez les domaines dans lesquels vous souhaitez proposer vos services.
    </p>
  </div>

  <div class="body">

    <div class="count-bar" *ngIf="selectedSpecialties.length > 0">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      {{ selectedSpecialties.length }} spécialité(s) sélectionnée(s)
    </div>

    <div class="card" *ngFor="let cat of categories">
      <div class="cat-header" (click)="toggleCategory(cat)">
        <div class="card-icon">
          <ion-icon name="grid-outline" class="c-icon"></ion-icon>
        </div>

        <span class="cat-title">{{ cat.name }}</span>

        <ion-icon
          class="chevron"
          [name]="cat.open ? 'chevron-up-outline' : 'chevron-down-outline'"
        ></ion-icon>
      </div>

      <div class="spec-list" *ngIf="cat.open">
        <div class="spec-item" *ngFor="let spec of cat.specialties">
          <ion-checkbox
            class="spec-check"
            [checked]="isSelected(spec)"
            (ionChange)="toggleSpecialty(spec)"
          ></ion-checkbox>

          <span class="spec-label">{{ spec }}</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <ion-button
        class="submit-btn"
        expand="block"
        [disabled]="selectedSpecialties.length === 0"
        (click)="next()"
      >
        Continuer
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </div>

  </div>
</ion-content>
