<ion-header>
  <ion-toolbar>
    <ion-title>General Information</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="top-section">
    <p class="hero-kicker">Inscription</p>
    <h2 class="hero-title">Créez votre compte.</h2>
    <p class="hero-sub">Remplissez les informations ci-dessous pour commencer.</p>
  </div>

  <div class="body">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="card">
        <div class="card-head">
          <div class="card-icon">
            <ion-icon name="person-outline" class="c-icon"></ion-icon>
          </div>
          <span class="card-title">Identité</span>
        </div>

        <div class="fields-wrap">
          <!-- Profile picture -->
          <div class="field-group">
            <label class="field-label">Photo de profil</label>

            <div class="profile-upload-box">
              <div class="profile-preview" *ngIf="imagePreview; else defaultAvatar">
                <img [src]="imagePreview" alt="Profile preview" class="profile-preview-img" />
              </div>

              <ng-template #defaultAvatar>
                <div class="profile-preview profile-preview-placeholder">
                  <ion-icon name="person-outline" class="profile-placeholder-icon"></ion-icon>
                </div>
              </ng-template>

              <label for="profileImageInput" class="profile-upload-btn">
                Choisir une image
              </label>
              <input
                id="profileImageInput"
                type="file"
                accept="image/*"
                (change)="onImageSelected($event)"
                hidden
              />
            </div>
          </div>

          <ion-grid class="ion-no-padding">
            <ion-row>
              <ion-col size="6">
                <div class="field-group pr">
                  <label class="field-label">Prénom</label>
                  <ion-item lines="none" class="field-item">
                    <ion-input type="text" placeholder="Jean" formControlName="firstName"></ion-input>
                  </ion-item>
                </div>
              </ion-col>

              <ion-col size="6">
                <div class="field-group pl">
                  <label class="field-label">Nom</label>
                  <ion-item lines="none" class="field-item">
                    <ion-input type="text" placeholder="Dupont" formControlName="lastName"></ion-input>
                  </ion-item>
                </div>
              </ion-col>
            </ion-row>
          </ion-grid>

          <div class="field-group">
            <label class="field-label">Email professionnel</label>
            <ion-item lines="none" class="field-item">
              <ion-input type="email" placeholder="jean.dupont@entreprise.com" formControlName="email"></ion-input>
            </ion-item>
          </div>

          <div class="field-group">
            <label class="field-label">Pays</label>
            <ion-item lines="none" class="field-item">
              <ion-select placeholder="Sélectionnez votre pays" formControlName="country">
                <ion-select-option value="fr">France</ion-select-option>
                <ion-select-option value="us">États-Unis</ion-select-option>
                <ion-select-option value="ca">Canada</ion-select-option>
              </ion-select>
            </ion-item>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-icon">
            <ion-icon name="lock-closed-outline" class="c-icon"></ion-icon>
          </div>
          <span class="card-title">Sécurité</span>
        </div>

        <div class="fields-wrap">
          <div class="field-group">
            <label class="field-label">Mot de passe</label>
            <ion-item lines="none" class="field-item">
              <ion-input type="password" placeholder="••••••••" formControlName="password"></ion-input>
            </ion-item>
          </div>

          <div class="field-group">
            <label class="field-label">Confirmer le mot de passe</label>
            <ion-item lines="none" class="field-item">
              <ion-input type="password" placeholder="••••••••" formControlName="confirmPassword"></ion-input>
            </ion-item>
          </div>
        </div>
      </div>

      <div class="terms-row">
        <ion-checkbox formControlName="terms" class="terms-check"></ion-checkbox>
        <p class="terms-text">
          J'accepte les <a class="terms-link">conditions d'utilisation</a> et la politique de confidentialité.
        </p>
      </div>

      <ion-button expand="block" type="submit" class="submit-btn">
        Créer mon compte
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>

    </form>
  </div>
</ion-content>
