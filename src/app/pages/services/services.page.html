<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Services</ion-title>
    <ion-buttons slot="end">
      <ion-button class="add-btn" (click)="goToCreateService()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Ajouter
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="body">

    <div class="section-header">
      <h3 class="section-title">Mes services</h3>
      <span class="section-count">{{ services.length }}</span>
    </div>

    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">

        <div class="card-image">
          <img [src]="service.image" alt="{{ service.title }}" />
        </div>

        <div class="card-body">
          <h3 class="card-title">{{ service.title }}</h3>

          <div class="card-meta">
            <div class="meta-item">
              <ion-icon name="star" class="star-icon"></ion-icon>
              <span>{{ service.rating }} ({{ service.reviews_count }})</span>
            </div>
            <div class="meta-item">
              <ion-icon name="time-outline"></ion-icon>
              <span>{{ service.delivery_time }}j</span>
            </div>
          </div>

          <div class="card-footer">
            <span class="price-label">À partir de</span>
            <span class="price">{{ service.price_basic }}€</span>
          </div>
        </div>

      </div>
    </div>

    <div class="empty-state" *ngIf="services.length === 0">
      <ion-icon name="briefcase-outline" class="empty-icon"></ion-icon>
      <p class="empty-text">Aucun service pour l'instant.</p>
      <ion-button class="empty-btn" (click)="goToCreateService()">
        Créer mon premier service
      </ion-button>
    </div>

  </div>
</ion-content>
