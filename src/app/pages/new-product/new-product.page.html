<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/tabs/products"
        text=""
        icon="chevron-back-outline"
      ></ion-back-button>
    </ion-buttons>

    <ion-title>Nouveau produit</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="body">

    <div class="top-block">
  <h2 class="page-title">Créer un produit</h2>
  <p class="page-sub">Ajoutez un produit digital avec ses détails, son prix et ses images.</p>
</div>
    <form [formGroup]="productForm" (ngSubmit)="saveProduct()">

      <div class="card">
        <div class="card-head">
          <div class="card-icon">
            <ion-icon name="image-outline" class="c-icon"></ion-icon>
          </div>
          <span class="card-title">Visuels du produit</span>
        </div>

        <div class="upload-body">
          <div class="main-preview-card">
            <ng-container *ngIf="mainImagePreview; else emptyMainImage">
              <img [src]="mainImagePreview" alt="Main preview" />
            </ng-container>
            <ng-template #emptyMainImage>
              <div class="empty-preview">
                <ion-icon name="image-outline"></ion-icon>
                <span>Aperçu principal</span>
              </div>
            </ng-template>
          </div>

          <label class="upload-btn">
            <ion-icon name="cloud-upload-outline"></ion-icon>
            Photo principale
            <input type="file" accept="image/*" hidden (change)="onMainImageSelected($event)" />
          </label>

          <div class="gallery-grid">
            <div class="gallery-item" *ngFor="let item of [0, 1, 2]; let i = index">
              <ng-container *ngIf="galleryPreviews[i]; else emptySmall">
                <img [src]="galleryPreviews[i]" alt="Gallery image" />
              </ng-container>
              <ng-template #emptySmall>
                <div class="empty-small">
                  <ion-icon name="add-outline"></ion-icon>
                </div>
              </ng-template>
            </div>
          </div>

          <label class="upload-btn secondary">
            <ion-icon name="images-outline"></ion-icon>
            Photos de galerie
            <input type="file" accept="image/*" multiple hidden (change)="onGalleryImagesSelected($event)" />
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-icon">
            <ion-icon name="document-text-outline" class="c-icon"></ion-icon>
          </div>
          <span class="card-title">Informations</span>
        </div>

        <div class="fields-wrap">
          <div class="field-group">
            <label class="field-label">Titre du produit</label>
            <ion-item lines="none" class="field-item">
              <ion-input formControlName="title" placeholder="Ex : UI Starter Kit"></ion-input>
            </ion-item>
          </div>

          <div class="field-group">
            <label class="field-label">Description</label>
            <ion-item lines="none" class="field-item textarea-item">
              <ion-textarea rows="4" formControlName="description"
                placeholder="Décrivez clairement ce que contient votre produit.">
              </ion-textarea>
            </ion-item>
          </div>

          <div class="double-fields">
            <div class="field-group">
              <label class="field-label">Version</label>
              <ion-item lines="none" class="field-item">
                <ion-input formControlName="version" placeholder="Ex : 1.0"></ion-input>
              </ion-item>
            </div>
            <div class="field-group">
              <label class="field-label">Licence</label>
              <ion-item lines="none" class="field-item">
                <ion-input formControlName="license" placeholder="Ex : Personal Use"></ion-input>
              </ion-item>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Prix (TND)</label>
            <ion-item lines="none" class="field-item">
              <ion-input type="number" formControlName="price" placeholder="Ex : 35"></ion-input>
            </ion-item>
          </div>
        </div>
      </div>

      <div class="action-row">
  <ion-button type="submit" class="submit-btn full">
    <ion-icon name="checkmark-outline" slot="start"></ion-icon>
    Publier le produit
  </ion-button>
</div>

    </form>
  </div>
</ion-content>
