<ion-tabs>
  <ion-tab-bar slot="bottom" class="app-tabbar">

    <ion-tab-button tab="home" [routerLink]="['/tabs/home']">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Maison</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="products" [routerLink]="['/tabs/products']">
      <ion-icon name="cart-outline"></ion-icon>
      <ion-label>Produits</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="jobs" [routerLink]="['/tabs/jobs']">
      <ion-icon name="search-outline"></ion-icon>
      <ion-label>Emplois</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="messages" [routerLink]="['/tabs/messages']">
      <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      <ion-label>Messages</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" [routerLink]="['/tabs/profile']">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Profil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
